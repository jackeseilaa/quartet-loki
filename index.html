<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Quartet Loki</title>
<style>
:root{--o:#0a4272;--g:#b45309;--c:#fff}
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}
body{background:#f3f4f6}
.topbar{background:var(--o);color:#fff;padding:15px;display:flex;justify-content:space-between}
.content{padding:15px;max-width:600px;margin:0 auto}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.tabs{display:flex;gap:5px;margin-bottom:15px}.tab{flex:1;padding:10px;border:none;border-radius:8px;background:#ddd}
.tab.active{background:var(--o);color:#fff}
.fab{position:fixed;bottom:20px;right:20px;background:var(--o);color:#fff;width:56px;height:56px;border-radius:50%;border:none;font-size:24px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;padding:20px}
.modal-c{background:#fff;padding:20px;border-radius:15px;width:100%;max-width:400px}
input,select{width:100%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:8px}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-weight:700;cursor:pointer}
.btn-p{background:var(--o);color:#fff}
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, addDoc, doc, deleteDoc, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const FB_CONFIG = {
  apiKey: "AIzaSyAs-7Z3P7F0-K4p6R7T9M2N1B4V6C8X0Z",
  authDomain: "jsailing-f716c.firebaseapp.com",
  projectId: "jsailing-f716c",
  storageBucket: "jsailing-f716c.appspot.com",
  messagingSenderId: "1056584218826",
  appId: "1:1056584218826:web:6f7b76778f65672200f862"
};
const auth = getAuth(initializeApp(FB_CONFIG));
const db = getFirestore();
window.S = { user: null, loki: [], tab: 'dashboard', modal: false, form: { pvm: new Date().toISOString().split('T')[0], kohde: '', kuka: 'tmi' } };

window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
window.logout = () => signOut(auth);
window.setTab = (t) => { S.tab = t; render(); };
window.toggleM = (v) => { S.modal = v; render(); };
window.save = async () => { await addDoc(collection(db, 'quartet_loki'), S.form); window.toggleM(false); };
window.del = async (id) => { if(confirm('Poista?')) await deleteDoc(doc(db, 'quartet_loki', id)); };
function render() {
  const root = document.getElementById('root');
  if (!S.user) {
    root.innerHTML = `<div style="height:100vh;display:flex;align-items:center;justify-content:center;background:#0a4272;color:#fff"><button class="btn" onclick="window.login()">Kirjaudu Googlella</button></div>`;
    return;
  }
  root.innerHTML = `
    <div class="topbar"><b>⚓ Quartet</b> <span onclick="window.logout()">Ulos</span></div>
    <div class="content">
      <div class="tabs">
        <button class="tab ${S.tab==='dashboard'?'active':''}" onclick="window.setTab('dashboard')">Stats</button>
        <button class="tab ${S.tab==='loki'?'active':''}" onclick="window.setTab('loki')">Loki</button>
      </div>
      ${S.tab==='dashboard' ? `<div class="card"><h2>${S.loki.length} merkintää</h2></div>` : 
      S.loki.map(i => `<div class="card"><b>${i.pvm}</b>: ${i.kohde} (${i.kuka}) <button onclick="window.del('${i.id}')">X</button></div>`).join('')}
    </div>
    <button class="fab" onclick="window.toggleM(true)">+</button>
    ${S.modal ? `<div class="modal"><div class="modal-c"><h3>Uusi</h3>
      <input type="date" value="${S.form.pvm}" oninput="S.form.pvm=this.value">
      <input type="text" placeholder="Kohde" oninput="S.form.kohde=this.value">
      <select onchange="S.form.kuka=this.value"><option value="tmi">Tmi</option><option value="oy">Oy</option></select>
      <button class="btn btn-p" onclick="window.save()">Tallenna</button>
      <button class="btn" onclick="window.toggleM(false)">Peruuta</button></div></div>` : ''}`;
}

onAuthStateChanged(auth, u => {
  if (u && u.email === 'jacke.seilaa@gmail.com') {
    S.user = u;
    onSnapshot(query(collection(db, 'quartet_loki'), orderBy('pvm', 'desc')), snap => {
      S.loki = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    });
  } else { S.user = null; render(); }
});
</script></body></html>
