<style>
:root{
  --ocean:#0a4272;--ocean-dark:#083458;
  --gold:#92400e;--gold-light:#b45309;
  --text:#111827;--text-muted:#374151;--text-light:#6b7280;
  --green:#166534;--green-bg:#dcfce7;--green-border:#86efac;
  --red:#991b1b;--red-bg:#fee2e2;--red-border:#fca5a5;
  --amber:#92400e;--amber-bg:#fef3c7;--amber-border:#fcd34d;
  --blue-bg:#dbeafe;--blue-border:#93c5fd;
  --line:#e5e7eb;--line-bright:#d1d5db;
  --card-bg:#ffffff;--shadow:0 1px 3px rgba(0,0,0,.10);
  --radius:12px;--radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:'Outfit',system-ui,sans-serif;color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;width:100%;background:#f3f4f6;}
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-card{background:#fff;border:1px solid var(--line-bright);border-radius:24px;padding:48px 40px;width:min(420px,100%);text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.12);}
.auth-emblem{font-size:52px;margin-bottom:16px;}
.auth-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:var(--ocean);letter-spacing:-.5px;margin-bottom:6px;}
.auth-title em{color:var(--gold);font-style:italic}
.auth-sub{font-size:14px;color:var(--text-muted);margin-bottom:32px;line-height:1.6;}
.btn-google{display:inline-flex;align-items:center;gap:12px;background:#fff;color:#1a1a2e;border:1.5px solid var(--line-bright);border-radius:12px;padding:14px 28px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(0,0,0,.1);width:100%;justify-content:center;}
.btn-google:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.15)}
.btn-google svg{width:20px;height:20px;flex-shrink:0}
.auth-note{margin-top:20px;font-size:12px;color:var(--text-muted);line-height:1.5;}
.loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:200;}
.loader-ring{width:48px;height:48px;border:3px solid var(--line-bright);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:13px;color:var(--text-muted)}
.app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
.topbar{background:#fff;border-bottom:2px solid var(--ocean);box-shadow:0 2px 8px rgba(0,0,0,.08);padding:0 12px;padding-top:var(--safe-top);display:flex;align-items:center;gap:8px;height:calc(52px + var(--safe-top));position:sticky;top:0;z-index:50;overflow:hidden;}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--ocean);letter-spacing:-.3px;white-space:nowrap;flex-shrink:0;}
.topbar-logo em{color:var(--gold);font-style:italic}
.version-badge{background:var(--ocean);color:#fff;border-radius:4px;padding:1px 6px;font-weight:700;font-size:10px;white-space:nowrap;flex-shrink:0}
.topbar-spacer{flex:1}
.topbar-user{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted);}
.topbar-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid var(--line-bright);}
.topbar-avatar-placeholder{width:30px;height:30px;border-radius:50%;background:var(--ocean);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.btn-signout{border:1px solid var(--line-bright);background:transparent;color:var(--text-muted);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;}
.btn-signout:hover{color:var(--red);border-color:var(--red)}
.nav-tabs{background:#fff;border-bottom:1.5px solid var(--line-bright);display:flex;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex:1;min-width:80px;padding:12px 8px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text-muted);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:color .15s,border-color .15s;white-space:nowrap;letter-spacing:.3px;text-transform:uppercase;}
.nav-tab.active{color:var(--ocean);border-bottom-color:var(--ocean);}
.main-content{flex:1;max-width:1080px;margin:0 auto;width:100%;padding:20px 16px;padding-bottom:calc(20px + var(--safe-bottom));}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--ocean);letter-spacing:-.4px;}
.card-sub{font-size:13px;color:var(--text-muted);margin-top:3px;font-weight:500}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;padding:9px 16px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap;letter-spacing:.2px;}
.btn:hover{opacity:.85}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--ocean);color:#fff;box-shadow:0 2px 8px rgba(10,66,114,.3);}
.btn-primary:hover{background:var(--ocean-dark)}
.btn-secondary{background:#f3f4f6;color:#1f2937;border:1px solid var(--line-bright);}
.btn-secondary:hover{background:#e5e7eb}
.btn-teal{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(22,101,52,.3);}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:7px}
.field{margin-bottom:14px}
.lbl{display:block;font-size:11px;font-weight:800;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
input,select,textarea{width:100%;padding:10px 13px;background:#fff;border:1.5px solid var(--line-bright);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;transition:border-color .15s;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ocean);box-shadow:0 0 0 3px rgba(10,66,114,.15);}
input::placeholder{color:var(--text-light)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
@media(max-width:680px){.grid2,.grid3,.grid4{grid-template-columns:1fr}}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.row-between{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.hr{border-top:1.5px solid var(--line);margin:16px 0}
.muted{color:var(--text-light);font-size:13px}
.small{font-size:12px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.3px;}
.badge-tmi{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd;}
.badge-oy{background:#ede9fe;color:#5b21b6;border:1px solid #c4b5fd;}
.badge-oma{background:#fef3c7;color:#92400e;border:1px solid #fcd34d;}

/* DASHBOARD - yrityskäyttö-% pääbanneri */
.usage-banner{background:linear-gradient(135deg,#0a4272 0%,#1e40af 100%);color:#fff;border-radius:16px;padding:24px 24px 20px;margin-bottom:16px;box-shadow:0 4px 16px rgba(10,66,114,.3);}
.usage-banner-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;opacity:.8;margin-bottom:6px;}
.usage-percent{font-family:'Cormorant Garamond',serif;font-size:64px;font-weight:700;line-height:1;letter-spacing:-2px;}
.usage-percent .label{font-size:18px;font-weight:600;opacity:.85;margin-left:4px;font-family:'Outfit',sans-serif;}
.usage-method-tabs{display:flex;gap:6px;margin-top:14px;}
.usage-method-tab{flex:1;background:rgba(255,255,255,.12);color:#fff;border:1.5px solid rgba(255,255,255,.25);padding:8px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;text-transform:uppercase;letter-spacing:.4px;transition:all .15s;}
.usage-method-tab.active{background:#fff;color:var(--ocean);border-color:#fff;}
.usage-bar-wrap{display:flex;height:10px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.15);margin-top:14px;}
.usage-bar-tmi{background:#60a5fa;}
.usage-bar-oy{background:#a78bfa;}
.usage-bar-oma{background:#fcd34d;}
.usage-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:12px;font-weight:600;}
.usage-legend-item{display:flex;align-items:center;gap:5px;opacity:.9;}
.usage-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.year-selector{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.year-btn{background:#fff;color:var(--text-muted);border:1.5px solid var(--line-bright);padding:7px 14px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif;}
.year-btn.active{background:var(--ocean);color:#fff;border-color:var(--ocean);}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:16px 0;}
.stat-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center;}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:var(--ocean);line-height:1;margin:4px 0;}
.stat-label{font-size:11px;color:var(--text-muted);font-weight:800;text-transform:uppercase;letter-spacing:.5px}

.log-item{padding:14px 0;border-top:1px solid var(--line);display:flex;gap:14px;justify-content:space-between;}
.log-item:first-child{border-top:none}
.log-date{flex-shrink:0;background:var(--ocean);color:#fff;border-radius:8px;padding:8px 10px;text-align:center;min-width:54px;}
.log-date .day{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;line-height:1;}
.log-date .month{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.85;margin-top:2px;}
.log-content{flex:1;min-width:0;}
.log-route{font-weight:700;font-size:14px;color:var(--text);margin-bottom:3px;}
.log-meta{font-size:12px;color:var(--text-muted);line-height:1.5;}
.log-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}

.infobox{padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.5;margin:10px 0;}
.infobox-blue{background:var(--blue-bg);color:#1e3a8a;border:1px solid var(--blue-border)}
.infobox-amber{background:var(--amber-bg);color:#78350f;border:1px solid var(--amber-border)}
.infobox-green{background:var(--green-bg);color:#14532d;border:1px solid var(--green-border)}

.overlay{position:fixed;inset:0;background:rgba(5,12,24,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:100;}
.modal{background:#fff;border:1px solid var(--line-bright);border-radius:20px;width:min(720px,100%);max-height:92vh;overflow:auto;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.modal-head{padding:18px 22px;border-bottom:1.5px solid var(--line);position:sticky;top:0;background:#fff;z-index:2;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--ocean);}
.modal-body{padding:22px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#16a34a;display:inline-block;margin-right:5px;}
.sync-dot.syncing{background:#d97706;animation:pulse .8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.firebase-setup{background:var(--amber-bg);border:1.5px solid #f59e0b;border-radius:12px;padding:16px 18px;margin-bottom:16px;font-size:13px;color:#78350f;font-weight:500;}

@media(max-width:600px){
  .topbar-user .name{display:none}
  .main-content{padding:10px 8px}
  .card{padding:14px 12px}
  .nav-tab{font-size:10px;padding:10px 4px;min-width:60px}
  .stat-val{font-size:24px}
  .usage-percent{font-size:48px}
  .btn{padding:8px 12px;font-size:12px}
}
</style>

<body>
<div id="app"><div class="loader"><div class="loader-ring"></div><div class="loader-text">Ladataan…</div></div></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,collection,doc,addDoc,setDoc,deleteDoc,onSnapshot,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ========== KONFIGURAATIO ==========
// Sama Firebase-projekti kuin J Sailing hallintapaneelilla
const FIREBASE_CONFIG={
  apiKey:"AIzaSyB7Dp5_5fN0Iko-4Jn1D2Dp6NNNih63UO0",
  authDomain:"jsailing-f716c.firebaseapp.com",
  projectId:"jsailing-f716c",
  storageBucket:"jsailing-f716c.firebasestorage.app",
  messagingSenderId:"543523103696",
  appId:"1:543523103696:web:439a312efa6aec398a8fd5"
};
const ALLOWED_EMAIL="jacke.seilaa@gmail.com";
const APP_VERSION="V1.0";
const UPDATE_DATE=(()=>{const n=new Date();return n.toLocaleDateString("fi-FI")+' klo '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');})();

// Käyttötarkoituksen vaihtoehdot
const VUOKRALAINEN_OPTS=[
  {value:"tmi",label:"J Sailing (Tmi)",desc:"Koulutus, tutkinto, charter — kulut Tmi:n vähennyksiin"},
  {value:"oy",label:"AJarmo Oy",desc:"Vuokraat veneen Oy:lle — saat henkilökohtaista vuokratuloa"},
  {value:"oma",label:"Oma käyttö",desc:"Vapaa-aika — ei verovaikutusta"}
];

const KAYTTO_TYYPPI_OPTS={
  tmi:[
    {value:"koulutus",label:"Koulutus / kurssi"},
    {value:"tutkinto",label:"Tutkinto"},
    {value:"charter",label:"Charter"},
    {value:"toimisto",label:"Toimistotyö satamassa"},
    {value:"huolto",label:"Huolto / kunnossapito"},
    {value:"siirto",label:"Siirtoajo"},
    {value:"muu",label:"Muu Tmi-toiminta"}
  ],
  oy:[
    {value:"oy-vuokraus",label:"Oy-vuokraus"},
    {value:"oy-edustus",label:"Oy:n edustustilaisuus"}
  ],
  oma:[
    {value:"vapaa-aika",label:"Vapaa-aika"},
    {value:"perhe",label:"Perhepurjehdus"}
  ]
};

const CONFIG_READY=!FIREBASE_CONFIG.apiKey.includes("KORVAA");
let app,auth,db;
if(CONFIG_READY){app=initializeApp(FIREBASE_CONFIG);auth=getAuth(app);db=getFirestore(app);}

// ========== STATE ==========
const state={
  tab:"dashboard",
  user:null,
  loki:[],          // Quartet-loki Firestoresta
  modal:null,
  editId:null,
  syncing:false,
  vuosi:new Date().getFullYear(),
  laskentaTapa:"paivat",  // paivat | tunnit | mailit
  draft:null
};

// ========== UTILS ==========
function today(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
function fmtDate(d){return d?new Date(d+"T00:00:00").toLocaleDateString("fi-FI"):"";}
function genId(p){return p+Math.random().toString(16).slice(2,8).toUpperCase();}
function num(v){return Number(v||0);}

const MONTHS_SHORT=["TAM","HEL","MAA","HUH","TOU","KES","HEI","ELO","SYY","LOK","MAR","JOU"];

// ========== FIRESTORE ==========
async function fsAdd(col,data){
  if(!db)return genId("X");
  state.syncing=true;renderSyncIndicator();
  try{
    const ref=await addDoc(collection(db,col),{...data,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});
    return ref.id;
  }finally{state.syncing=false;renderSyncIndicator();}
}
async function fsSet(col,id,data){
  if(!db)return;
  state.syncing=true;renderSyncIndicator();
  try{
    await setDoc(doc(db,col,id),{...data,updatedAt:serverTimestamp()},{merge:true});
  }finally{state.syncing=false;renderSyncIndicator();}
}
async function fsDel(col,id){
  if(!db)return;
  state.syncing=true;renderSyncIndicator();
  try{await deleteDoc(doc(db,col,id));}
  finally{state.syncing=false;renderSyncIndicator();}
}
function renderSyncIndicator(){
  const el=document.getElementById("syncDot");
  if(!el)return;
  el.className="sync-dot"+(state.syncing?" syncing":"");
}

const unsubscribers=[];
function startListeners(uid){
  // Käytetään kokoelmaa quartet_loki — selvästi erillään hallintapaneelin kokoelmista
  const unsub=onSnapshot(collection(db,"quartet_loki"),snap=>{
    state.loki=snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  });
  unsubscribers.push(unsub);
}
function stopListeners(){unsubscribers.forEach(u=>u());unsubscribers.length=0;}

// ========== LASKELMAT ==========
function getLokiVuodelle(vuosi){
  return state.loki.filter(l=>{
    const y=String(l.pvm||"").slice(0,4);
    return y===String(vuosi);
  });
}

function laskeYrityskaytto(vuosi,tapa){
  const lokit=getLokiVuodelle(vuosi);
  let tmi=0,oy=0,oma=0;

  for(const l of lokit){
    let arvo=0;
    if(tapa==="paivat"){
      // Lasketaan yhden päivän kestäväksi (tai usean jos endPvm)
      const start=new Date((l.pvm||"")+"T00:00:00");
      const end=l.endPvm?new Date(l.endPvm+"T00:00:00"):start;
      const days=Math.max(1,Math.round((end-start)/86400000)+1);
      arvo=days;
    } else if(tapa==="tunnit"){
      const ka=num(l.konetunnitAlku);
      const kl=num(l.konetunnitLoppu);
      arvo=Math.max(0,kl-ka);
    } else if(tapa==="mailit"){
      arvo=num(l.mailit);
    }

    if(l.vuokralainen==="tmi")tmi+=arvo;
    else if(l.vuokralainen==="oy")oy+=arvo;
    else if(l.vuokralainen==="oma")oma+=arvo;
  }

  const yhteensa=tmi+oy+oma;
  const tmiPct=yhteensa>0?(tmi/yhteensa)*100:0;
  const oyPct=yhteensa>0?(oy/yhteensa)*100:0;
  const omaPct=yhteensa>0?(oma/yhteensa)*100:0;
  // Tmi:n vähennysosuus = vain tmi (oy on erillinen vuokratoiminta)
  return{tmi,oy,oma,yhteensa,tmiPct,oyPct,omaPct};
}

function konetunnitYhteenveto(vuosi){
  const lokit=getLokiVuodelle(vuosi).filter(l=>l.konetunnitAlku||l.konetunnitLoppu);
  if(lokit.length===0)return{alku:null,loppu:null,kertyma:0};
  const sorted=lokit.slice().sort((a,b)=>(a.pvm||"").localeCompare(b.pvm||""));
  let minAlku=null,maxLoppu=null,kertyma=0;
  for(const l of sorted){
    const ka=num(l.konetunnitAlku);
    const kl=num(l.konetunnitLoppu);
    if(ka>0&&(minAlku===null||ka<minAlku))minAlku=ka;
    if(kl>0&&(maxLoppu===null||kl>maxLoppu))maxLoppu=kl;
    kertyma+=Math.max(0,kl-ka);
  }
  return{alku:minAlku,loppu:maxLoppu,kertyma};
}

function mailitYhteenveto(vuosi){
  const lokit=getLokiVuodelle(vuosi);
  return lokit.reduce((s,l)=>s+num(l.mailit),0);
}

function getAvailableYears(){
  const years=new Set();
  for(const l of state.loki){
    const y=String(l.pvm||"").slice(0,4);
    if(y)years.add(y);
  }
  years.add(String(new Date().getFullYear()));
  return Array.from(years).sort().reverse();
}

// ========== RENDER ==========
function render(){
  document.getElementById("app").innerHTML=
    renderTopBar()+
    renderNavTabs()+
    `<div class="main-content">${renderTab()}</div>`+
    renderModal();
  document.title=`Quartet Loki ${APP_VERSION}`;
  bind();
}

function renderTopBar(){
  const u=state.user;
  const syncEl=CONFIG_READY?`<span id="syncDot" class="sync-dot"></span>`:"";
  return`<div class="topbar">

function renderLokiItem(l){
  const d=new Date((l.pvm||today())+"T00:00:00");
  const day=d.getDate();
  const month=MONTHS_SHORT[d.getMonth()];
  const vuokralainen=VUOKRALAINEN_OPTS.find(v=>v.value===l.vuokralainen);
  const badgeClass=l.vuokralainen==="tmi"?"badge-tmi":l.vuokralainen==="oy"?"badge-oy":"badge-oma";
  const tyyppiLabel=(()=>{
    if(!l.vuokralainen||!l.kayttoTyyppi)return "";
    const opts=KAYTTO_TYYPPI_OPTS[l.vuokralainen]||[];
    const found=opts.find(o=>o.value===l.kayttoTyyppi);
    return found?found.label:l.kayttoTyyppi;
  })();
  const reitti=l.reitti||(l.lahtoPaikka&&l.saapumisPaikka?`${l.lahtoPaikka} → ${l.saapumisPaikka}`:l.lahtoPaikka||"");
  const monipv=l.endPvm&&l.endPvm!==l.pvm;

  return`<div class="log-item">
    <div class="log-date">
      <div class="day">${day}</div>
      <div class="month">${month}</div>
      ${monipv?`<div style="font-size:9px;margin-top:2px;opacity:.85">→ ${new Date(l.endPvm+"T00:00:00").getDate()}.${new Date(l.endPvm+"T00:00:00").getMonth()+1}.</div>`:""}
    </div>
    <div class="log-content">
      <div class="log-route">${esc(reitti||"(ei reittiä)")}</div>
      <div class="log-meta">
        ${vuokralainen?`<span class="badge ${badgeClass}">${esc(vuokralainen.label)}</span>`:`<span class="badge badge-oma">⚠ Tarkoitus puuttuu</span>`}
        ${tyyppiLabel?` <span style="color:var(--text-light)">· ${esc(tyyppiLabel)}</span>`:""}
        ${l.miehisto?`<div style="margin-top:4px">👥 ${esc(l.miehisto)}</div>`:""}
        <div style="margin-top:4px;font-size:11px;color:var(--text-light)">
          ${num(l.mailit)>0?`⛵ ${num(l.mailit).toFixed(1)} NM`:""}
          ${num(l.konetunnitAlku)>0||num(l.konetunnitLoppu)>0?` · ⚙️ ${num(l.konetunnitAlku).toFixed(1)}–${num(l.konetunnitLoppu).toFixed(1)} h (${(num(l.konetunnitLoppu)-num(l.konetunnitAlku)).toFixed(1)}h)`:""}
          ${l.tuuli?` · 💨 ${esc(l.tuuli)}${l.tuulenSuunta?" "+esc(l.tuulenSuunta):""}`:""}
          ${l.saatila?` · ${esc(l.saatila)}`:""}
        </div>
        ${l.huomiot?`<div style="margin-top:6px;font-size:12px;color:var(--text-muted);font-style:italic">${esc(l.huomiot)}</div>`:""}
      </div>
    </div>
    <div class="log-actions">
      <button class="btn btn-secondary btn-sm" data-action="edit-loki" data-id="${l.id}">Muokkaa</button>
      <button class="btn btn-danger btn-sm" data-action="delete-loki" data-id="${l.id}">Poista</button>
    </div>
  </div>`;
}

// ========== EVENT HANDLERS ==========
function bind(){
  // Tab navigation
  document.querySelectorAll("[data-tab]").forEach(b=>{
    b.onclick=()=>{state.tab=b.dataset.tab;render();};
  });

  // Year selector
  document.querySelectorAll("[data-year]").forEach(b=>{
    b.onclick=()=>{state.vuosi=parseInt(b.dataset.year);render();};
  });

  // Method tabs (laskentaTapa)
  document.querySelectorAll("[data-method]").forEach(b=>{
    b.onclick=()=>{state.laskentaTapa=b.dataset.method;render();};
  });

  // Vuokralainen change → re-render to update tyyppi options
  document.querySelector('[data-action="vuokralainen-changed"]')?.addEventListener("change",e=>{
    if(!state.draft)state.draft={};
    // Save current form values into draft
    saveFormToDraft();
    state.draft.vuokralainen=e.target.value;
    state.draft.kayttoTyyppi=""; // Reset tyyppi when vuokralainen changes
    render();
  });

  // Action buttons
  document.querySelectorAll("[data-action]").forEach(el=>{
    if(el.tagName==="SELECT"&&el.dataset.action==="vuokralainen-changed")return;
    el.onclick=async(e)=>{
      e.stopPropagation();
      const a=el.dataset.action,itemId=el.dataset.id;

      if(a==="sign-out"){await signOut(auth);return;}

      if(a==="close-modal"){
        state.modal=null;state.editId=null;state.draft=null;render();return;
      }

      if(a==="new-loki"){
        state.modal="loki";state.editId=null;state.draft={};render();return;
      }

      if(a==="edit-loki"){
        state.modal="loki";state.editId=itemId;state.draft={};render();return;
      }

      if(a==="delete-loki"){
        if(!confirm("Poistetaanko lokimerkintä?"))return;
        await fsDel("quartet_loki",itemId);
        if(state.modal==="loki"){state.modal=null;state.editId=null;state.draft=null;}
        render();return;
      }

      if(a==="save-loki"){
        const data=collectFormData();
        if(!data.pvm)return alert("Päivämäärä on pakollinen.");
        if(!data.vuokralainen)return alert("Valitse vuokralainen / käyttäjä.");
        if(state.editId){
          await fsSet("quartet_loki",state.editId,data);
        }else{
          await fsAdd("quartet_loki",data);
        }
        state.modal=null;state.editId=null;state.draft=null;render();return;
      }
    };
  });
}

function collectFormData(){
  const get=f=>document.querySelector(`[data-field="${f}"]`)?.value||"";
  const data={
    pvm:get("pvm"),
    endPvm:get("endPvm"),
    vuosi:parseInt((get("pvm")||today()).slice(0,4)),
    kuukausi:parseInt((get("pvm")||today()).slice(5,7)),
    vuokralainen:get("vuokralainen"),
    kayttoTyyppi:get("kayttoTyyppi"),
    lahtoAika:get("lahtoAika"),
    saapumisAika:get("saapumisAika"),
    lahtoPaikka:get("lahtoPaikka"),
    saapumisPaikka:get("saapumisPaikka"),
    reitti:get("reitti"),
    miehisto:get("miehisto"),
    konetunnitAlku:parseFloat(get("konetunnitAlku"))||null,
    konetunnitLoppu:parseFloat(get("konetunnitLoppu"))||null,
    mailit:parseFloat(get("mailit"))||null,
    veneenLokiAlku:parseFloat(get("veneenLokiAlku"))||null,
    tuuli:get("tuuli"),
    tuulenSuunta:get("tuulenSuunta"),
    saatila:get("saatila"),
    huomiot:get("huomiot")
  };
  return data;
}

function saveFormToDraft(){
  if(!state.draft)state.draft={};
  const fields=["pvm","endPvm","lahtoAika","saapumisAika","lahtoPaikka","saapumisPaikka","reitti","miehisto","konetunnitAlku","konetunnitLoppu","mailit","veneenLokiAlku","tuuli","tuulenSuunta","saatila","huomiot","kayttoTyyppi"];
  for(const f of fields){
    const el=document.querySelector(`[data-field="${f}"]`);
    if(el)state.draft[f]=el.value;
  }
}

// ========== INIT ==========
if(!CONFIG_READY){
  document.getElementById("app").innerHTML=`<div class="firebase-setup">⚠️ <strong>Firebase ei ole konfiguroitu.</strong></div>`;
}else{
  onAuthStateChanged(auth,user=>{
    if(user){
      if(user.email!==ALLOWED_EMAIL){
        signOut(auth);
        renderAuthScreen(`Pääsy estetty. Vain ${ALLOWED_EMAIL} voi kirjautua.`);
        return;
      }
      state.user=user;
      startListeners(user.uid);
      render();
    }else{
      stopListeners();
      state.user=null;
      state.loki=[];
      renderAuthScreen();
    }
  });
}
</script>
