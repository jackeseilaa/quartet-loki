<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Quartet Loki"/>
<meta name="theme-color" content="#0a4272"/>
<title>Quartet Loki V1.1 — s/y Quartet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ocean:#0a4272;--ocean-dark:#083458;
  --gold:#92400e;--gold-light:#b45309;
  --text:#111827;--text-muted:#374151;--text-light:#6b7280;
  --green:#166534;--green-bg:#dcfce7;--green-border:#86efac;
  --red:#991b1b;--red-bg:#fee2e2;--red-border:#fca5a5;
  --amber:#92400e;--amber-bg:#fef3c7;--amber-border:#fcd34d;
  --blue-bg:#dbeafe;--blue-border:#93c5fd;
  --line:#e5e7eb;--line-bright:#d1d5db;
  --card-bg:#ffffff;--shadow:0 1px 3px rgba(0,0,0,.10);
  --radius:12px;--radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:'Outfit',system-ui,sans-serif;color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;width:100%;background:#f3f4f6;}
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-card{background:#fff;border:1px solid var(--line-bright);border-radius:24px;padding:48px 40px;width:min(420px,100%);text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.12);}
.auth-emblem{font-size:52px;margin-bottom:16px;}
.auth-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:var(--ocean);letter-spacing:-.5px;margin-bottom:6px;}
.auth-title em{color:var(--gold);font-style:italic}
.auth-sub{font-size:14px;color:var(--text-muted);margin-bottom:32px;line-height:1.6;}
.btn-google{display:inline-flex;align-items:center;gap:12px;background:#fff;color:#1a1a2e;border:1.5px solid var(--line-bright);border-radius:12px;padding:14px 28px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(0,0,0,.1);width:100%;justify-content:center;}
.btn-google:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.15)}
.btn-google svg{width:20px;height:20px;flex-shrink:0}
.auth-note{margin-top:20px;font-size:12px;color:var(--text-muted);}
.loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:200;}
.loader-ring{width:48px;height:48px;border:3px solid var(--line-bright);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:13px;color:var(--text-muted)}
.app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
.topbar{background:#fff;border-bottom:2px solid var(--ocean);box-shadow:0 2px 8px rgba(0,0,0,.08);padding:0 12px;padding-top:var(--safe-top);display:flex;align-items:center;gap:8px;height:calc(52px + var(--safe-top));position:sticky;top:0;z-index:50;}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--ocean);letter-spacing:-.3px;white-space:nowrap;flex-shrink:0;}
.topbar-logo em{color:var(--gold);font-style:italic}
.version-badge{background:var(--ocean);color:#fff;border-radius:4px;padding:1px 6px;font-weight:700;font-size:10px;white-space:nowrap;flex-shrink:0}
.topbar-spacer{flex:1}
.topbar-user{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted);}
.topbar-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid var(--line-bright);}
.topbar-avatar-placeholder{width:30px;height:30px;border-radius:50%;background:var(--ocean);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.btn-signout{border:1px solid var(--line-bright);background:transparent;color:var(--text-muted);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;}
.btn-signout:hover{color:var(--red);border-color:var(--red)}
.nav-tabs{background:#fff;border-bottom:1.5px solid var(--line-bright);display:flex;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex:1;min-width:70px;padding:12px 6px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text-muted);font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:color .15s,border-color .15s;white-space:nowrap;letter-spacing:.3px;text-transform:uppercase;}
.nav-tab.active{color:var(--ocean);border-bottom-color:var(--ocean);}
.main-content{flex:1;max-width:1080px;margin:0 auto;width:100%;padding:20px 16px;padding-bottom:calc(20px + var(--safe-bottom));}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--ocean);letter-spacing:-.4px;}
.card-sub{font-size:13px;color:var(--text-muted);margin-top:3px;font-weight:500}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;padding:9px 16px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap;letter-spacing:.2px;}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--ocean);color:#fff;box-shadow:0 2px 8px rgba(10,66,114,.3);}
.btn-primary:hover{background:var(--ocean-dark)}
.btn-secondary{background:#f3f4f6;color:#1f2937;border:1px solid var(--line-bright);}
.btn-secondary:hover{background:#e5e7eb}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.btn-amber{background:var(--amber-bg);color:#78350f;border:1px solid var(--amber-border);}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:7px}
.field{margin-bottom:14px}
.lbl{display:block;font-size:11px;font-weight:800;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
input,select,textarea{width:100%;padding:10px 13px;background:#fff;border:1.5px solid var(--line-bright);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;transition:border-color .15s;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ocean);box-shadow:0 0 0 3px rgba(10,66,114,.15);}
input::placeholder{color:var(--text-light)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:680px){.grid2,.grid3{grid-template-columns:1fr}}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.row-between{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.hr{border-top:1.5px solid var(--line);margin:16px 0}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.3px;}
.badge-tmi{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd;}
.badge-oy{background:#ede9fe;color:#5b21b6;border:1px solid #c4b5fd;}
.badge-oma{background:#fef3c7;color:#92400e;border:1px solid #fcd34d;}
.badge-huolto{background:var(--amber-bg);color:#92400e;border:1px solid var(--amber-border);}

/* USAGE BANNER */
.usage-banner{background:linear-gradient(135deg,#0a4272 0%,#1e40af 100%);color:#fff;border-radius:16px;padding:24px 24px 20px;margin-bottom:16px;box-shadow:0 4px 16px rgba(10,66,114,.3);}
.usage-banner-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;opacity:.8;margin-bottom:6px;}
.usage-percent{font-family:'Cormorant Garamond',serif;font-size:64px;font-weight:700;line-height:1;letter-spacing:-2px;}
.usage-percent .label{font-size:18px;font-weight:600;opacity:.85;margin-left:4px;font-family:'Outfit',sans-serif;}
.usage-method-tabs{display:flex;gap:6px;margin-top:14px;}
.usage-method-tab{flex:1;background:rgba(255,255,255,.12);color:#fff;border:1.5px solid rgba(255,255,255,.25);padding:8px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;text-transform:uppercase;letter-spacing:.4px;transition:all .15s;}
.usage-method-tab.active{background:#fff;color:var(--ocean);border-color:#fff;}
.usage-bar-wrap{display:flex;height:10px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.15);margin-top:14px;}
.usage-bar-tmi{background:#60a5fa;}
.usage-bar-oy{background:#a78bfa;}
.usage-bar-oma{background:#fcd34d;}
.usage-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:12px;font-weight:600;}
.usage-legend-item{display:flex;align-items:center;gap:5px;opacity:.9;}
.usage-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.year-selector{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.year-btn{background:#fff;color:var(--text-muted);border:1.5px solid var(--line-bright);padding:7px 14px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif;}
.year-btn.active{background:var(--ocean);color:#fff;border-color:var(--ocean);}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:16px 0;}
.stat-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center;}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:var(--ocean);line-height:1;margin:4px 0;}
.stat-label{font-size:11px;color:var(--text-muted);font-weight:800;text-transform:uppercase;letter-spacing:.5px}

/* HUOLTOWIDGET */
.huolto-widget{background:#fff;border:1.5px solid var(--amber-border);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;box-shadow:var(--shadow);}
.huolto-widget-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.huolto-widget-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#92400e;}
.huolto-widget-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.hw-item{text-align:center;}
.hw-val{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--text);line-height:1.2;}
.hw-lbl{font-size:10px;color:var(--text-light);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}
.huolto-widget-desc{font-size:12px;color:var(--text-muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--line);}

/* LOKIKIRJA */
.log-item{padding:14px 0;border-top:1px solid var(--line);display:flex;gap:14px;justify-content:space-between;}
.log-item:first-child{border-top:none}
.log-date{flex-shrink:0;background:var(--ocean);color:#fff;border-radius:8px;padding:8px 10px;text-align:center;min-width:54px;}
.log-date .day{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;line-height:1;}
.log-date .month{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.85;margin-top:2px;}
.log-date.huolto-bg{background:#92400e;}
.log-content{flex:1;min-width:0;}
.log-route{font-weight:700;font-size:14px;color:var(--text);margin-bottom:3px;}
.log-meta{font-size:12px;color:var(--text-muted);line-height:1.5;}
.log-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}

/* TAPAHTUMAT */
.tapahtumat-box{margin-top:8px;padding:10px 12px;background:#f8fafc;border-radius:8px;border:1px solid var(--line);}
.tap-box-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin-bottom:6px;}
.tap-row{display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-top:1px solid var(--line);}
.tap-row:first-of-type{border-top:none}
.tap-aika{font-size:11px;color:var(--text-light);min-width:38px;padding-top:1px;}
.tap-paikka{font-size:13px;font-weight:600;color:var(--ocean);}
.tap-huomio{font-size:12px;color:var(--text-muted);}
.tap-gps{font-size:10px;color:var(--text-light);}

/* TAPAHTUMAT EDITORI */
.tap-editor{background:#f8fafc;border:1.5px solid var(--line);border-radius:10px;padding:12px;margin-top:8px;}
.tap-editor-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--line);}
.tap-editor-row:last-child{border-bottom:none}
.tap-editor-info{flex:1;min-width:0;}
.tap-editor-paikka{font-size:13px;font-weight:600;color:var(--ocean);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tap-editor-meta{font-size:11px;color:var(--text-muted);}
.tap-del-btn{background:none;border:none;color:var(--text-light);font-size:16px;cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1;}
.tap-del-btn:hover{background:var(--red-bg);color:var(--red);}
.tap-add-row{display:flex;gap:6px;margin-top:8px;}
.tap-add-row input{flex:1;padding:8px 10px;font-size:13px;}
.tap-gps-btn{background:var(--ocean);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:14px;cursor:pointer;flex-shrink:0;}
.tap-gps-btn:hover{background:var(--ocean-dark)}
.tap-add-btn{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-border);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;flex-shrink:0;}
.tap-hint{font-size:11px;color:var(--text-light);margin-top:6px;line-height:1.5;}

/* CALC ROW */
.calc-row{background:var(--blue-bg);border:1px solid var(--blue-border);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#1e40af;display:flex;gap:10px;align-items:center;}
.calc-row strong{font-size:15px;font-weight:800;}

/* IMPORT */
.import-dropzone{border:2px dashed var(--line-bright);border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:.15s;}
.import-dropzone:hover{border-color:var(--ocean);background:var(--blue-bg);}
.import-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.import-table th{background:#f3f4f6;padding:6px 8px;text-align:left;font-weight:700;border-bottom:1px solid var(--line);}
.import-table td{padding:5px 8px;border-bottom:1px solid var(--line);color:var(--text-muted);}

/* AUTOSAVE */
.autosave-toast{position:fixed;bottom:calc(var(--safe-bottom)+14px);left:50%;transform:translateX(-50%);background:rgba(22,101,52,.92);color:#fff;padding:7px 18px;border-radius:999px;font-size:12px;font-weight:600;display:none;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.2);white-space:nowrap;}
.autosave-toast.show{display:block;}

.infobox{padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.5;margin:10px 0;}
.infobox-blue{background:var(--blue-bg);color:#1e3a8a;border:1px solid var(--blue-border)}
.infobox-amber{background:var(--amber-bg);color:#78350f;border:1px solid var(--amber-border)}
.infobox-green{background:var(--green-bg);color:#14532d;border:1px solid var(--green-border)}
.overlay{position:fixed;inset:0;background:rgba(5,12,24,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:100;}
.modal{background:#fff;border:1px solid var(--line-bright);border-radius:20px;width:min(720px,100%);max-height:92vh;overflow:auto;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.modal-head{padding:18px 22px;border-bottom:1.5px solid var(--line);position:sticky;top:0;background:#fff;z-index:2;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--ocean);}
.modal-body{padding:22px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#16a34a;display:inline-block;margin-right:5px;}
.sync-dot.syncing{background:#d97706;animation:pulse .8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

@media(max-width:600px){
  .main-content{padding:10px 8px}
  .card{padding:14px 12px}
  .nav-tab{font-size:10px;padding:10px 4px;min-width:58px}
  .stat-val{font-size:24px}
  .usage-percent{font-size:48px}
  .btn{padding:8px 12px;font-size:12px}
  .huolto-widget-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="app"><div class="loader"><div class="loader-ring"></div><div class="loader-text">Ladataan…</div></div></div>
<div class="autosave-toast" id="autosaveToast">💾 Luonnos tallennettu automaattisesti</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,collection,doc,addDoc,setDoc,deleteDoc,onSnapshot,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FIREBASE_CONFIG={
  apiKey:"AIzaSyB7Dp5_5fN0Iko-4Jn1D2Dp6NNNih63UO0",
  authDomain:"jsailing-f716c.firebaseapp.com",
  projectId:"jsailing-f716c",
  storageBucket:"jsailing-f716c.firebasestorage.app",
  messagingSenderId:"543523103696",
  appId:"1:543523103696:web:439a312efa6aec398a8fd5"
};
const ALLOWED_EMAIL="jacke.seilaa@gmail.com";
const APP_VERSION="V1.1";

const VUOKRALAINEN_OPTS=[
  {value:"tmi",label:"J Sailing (Tmi)",desc:"Koulutus, tutkinto, charter — kulut Tmi:n vähennyksiin"},
  {value:"oy",label:"AJarmo Oy",desc:"Vuokraat veneen Oy:lle — saat henkilökohtaista vuokratuloa"},
  {value:"oma",label:"Oma käyttö",desc:"Vapaa-aika — ei verovaikutusta"}
];
const KAYTTO_TYYPPI_OPTS={
  tmi:[
    {value:"koulutus",label:"Koulutus / kurssi"},
    {value:"tutkinto",label:"Tutkinto"},
    {value:"charter",label:"Charter"},
    {value:"toimisto",label:"Toimistotyö satamassa"},
    {value:"huolto",label:"Huolto / kunnossapito"},
    {value:"siirto",label:"Siirtoajo"},
    {value:"muu",label:"Muu Tmi-toiminta"}
  ],
  oy:[
    {value:"oy-vuokraus",label:"Oy-vuokraus"},
    {value:"oy-edustus",label:"Oy:n edustustilaisuus"},
    {value:"oy-toimisto",label:"Oy:n toimistotyö"}   // ← UUSI
  ],
  oma:[
    {value:"vapaa-aika",label:"Vapaa-aika"},
    {value:"perhe",label:"Perhepurjehdus"}
  ]
};

const fbApp=initializeApp(FIREBASE_CONFIG);
const auth=getAuth(fbApp);
const db=getFirestore(fbApp);

// ── STATE ──
const state={
  tab:"dashboard",user:null,
  loki:[],huollot:[],
  modal:null,editId:null,editHuoltoId:null,
  syncing:false,
  vuosi:new Date().getFullYear(),
  laskentaTapa:"paivat",
  draft:null,
  tapahtumat:[],
  newTapPaikka:"",newTapHuomio:"",
  importRows:null,
  autosaveTimer:null,
};

const MONTHS_SHORT=["TAM","HEL","MAA","HUH","TOU","KES","HEI","ELO","SYY","LOK","MAR","JOU"];
function today(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
function fmtDate(d){return d?new Date(d+"T00:00:00").toLocaleDateString("fi-FI"):"";}
function num(v){return Number(v||0);}
function nowTime(){const n=new Date();return String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");}

// ── FIRESTORE ──
async function fsAdd(col,data){
  state.syncing=true;rsi();
  try{const r=await addDoc(collection(db,col),{...data,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});return r.id;}
  finally{state.syncing=false;rsi();}
}
async function fsSet(col,id,data){
  state.syncing=true;rsi();
  try{await setDoc(doc(db,col,id),{...data,updatedAt:serverTimestamp()},{merge:true});}
  finally{state.syncing=false;rsi();}
}
async function fsDel(col,id){
  state.syncing=true;rsi();
  try{await deleteDoc(doc(db,col,id));}
  finally{state.syncing=false;rsi();}

// ── LASKELMAT ──
function getLokiVuodelle(v){return state.loki.filter(l=>String(l.pvm||"").slice(0,4)===String(v));}
function laskeYrityskaytto(vuosi,tapa){
  let tmi=0,oy=0,oma=0;
  for(const l of getLokiVuodelle(vuosi)){
    let arvo=0;
    if(tapa==="paivat"){
      const s=new Date((l.pvm||"")+"T00:00:00");
      const e=l.endPvm?new Date(l.endPvm+"T00:00:00"):s;
      arvo=Math.max(1,Math.round((e-s)/86400000)+1);
    }else if(tapa==="tunnit"){arvo=Math.max(0,num(l.konetunnitLoppu)-num(l.konetunnitAlku));}
    else{arvo=num(l.mailit);}
    if(l.vuokralainen==="tmi")tmi+=arvo;
    else if(l.vuokralainen==="oy")oy+=arvo;
    else oma+=arvo;
  }
  const yht=tmi+oy+oma;
  return{tmi,oy,oma,yhteensa:yht,
    tmiPct:yht>0?(tmi/yht)*100:0,
    oyPct:yht>0?(oy/yht)*100:0,
    omaPct:yht>0?(oma/yht)*100:0};
}
function konetunnitYhteenveto(v){
  const ll=getLokiVuodelle(v).filter(l=>l.konetunnitAlku||l.konetunnitLoppu);
  if(!ll.length)return{alku:null,loppu:null,kertyma:0};
  let minA=null,maxL=null,kertyma=0;
  for(const l of ll){
    const ka=num(l.konetunnitAlku),kl=num(l.konetunnitLoppu);
    if(ka>0&&(minA===null||ka<minA))minA=ka;
    if(kl>0&&(maxL===null||kl>maxL))maxL=kl;
    kertyma+=Math.max(0,kl-ka);
  }
  return{alku:minA,loppu:maxL,kertyma};
}
function mailitYhteenveto(v){return getLokiVuodelle(v).reduce((s,l)=>s+num(l.mailit),0);}
function getAvailableYears(){
  const yrs=new Set(state.loki.map(l=>String(l.pvm||"").slice(0,4)).filter(Boolean));
  yrs.add(String(new Date().getFullYear()));
  return Array.from(yrs).sort().reverse();
}
function viimaHuolto(){
  const fromLoki=state.loki.filter(l=>l.kayttoTyyppi==="huolto")
    .map(l=>({pvm:l.pvm,konetunnit:l.konetunnitLoppu||l.konetunnitAlku,lokilukema:l.veneenLokiAlku,kuvaus:l.huomiot||"Lokimerkintä / huolto"}));
  const fromKirja=state.huollot.map(h=>({...h}));
  return [...fromLoki,...fromKirja].sort((a,b)=>(b.pvm||"").localeCompare(a.pvm||""))[0]||null;
}
// Palauttaa edellisen merkinnän loppulukemat
function edellisetLukemat(){
  if(!state.loki.length)return{kt:null,lokilukema:null};
  const sorted=[...state.loki].sort((a,b)=>(b.pvm||"").localeCompare(a.pvm||""));
  const v=sorted[0];
  return{kt:v.konetunnitLoppu||null,lokilukema:v.veneenLokiAlku||null};
}

// ── GPS ──
async function haeGPS(){
  return new Promise((res,rej)=>{
    if(!navigator.geolocation){rej(new Error("GPS ei saatavilla"));return;}
    navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lon:p.coords.longitude}),rej,{enableHighAccuracy:true,timeout:10000});
  });
}
async function geoReverse(lat,lon){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=fi`);
    const j=await r.json();
    return j.name||j.address?.road||j.display_name?.split(",")[0]||`${lat.toFixed(4)},${lon.toFixed(4)}`;
  }catch{return`${lat.toFixed(4)},${lon.toFixed(4)}`;}
}
async function haeGPSpaikka(){
  const btn=document.getElementById("tapGpsBtn");
  if(btn)btn.textContent="📍…";
  try{
    const g=await haeGPS();
    const nimi=await geoReverse(g.lat,g.lon);
    state.newTapPaikka=nimi;
    const inp=document.getElementById("tapPaikkaInp");
    if(inp)inp.value=nimi;
  }catch(e){alert("GPS-haku epäonnistui.");}
  finally{if(btn)btn.textContent="📍";}
}
async function lisaaTapahtuma(paikka,huomio){
  if(!paikka&&!huomio){alert("Syötä paikka tai huomio.");return;}
  const t={aika:nowTime(),paikka:paikka||"—",huomio:huomio||"",lat:null,lon:null};
  try{
    const g=await haeGPS();
    t.lat=parseFloat(g.lat.toFixed(5));t.lon=parseFloat(g.lon.toFixed(5));
    if(t.paikka==="—")t.paikka=await geoReverse(g.lat,g.lon);
  }catch(e){}
  state.tapahtumat.push(t);
  state.newTapPaikka="";state.newTapHuomio="";
  render();
}

// ─── EVENT BINDING ───
function bind(){
  document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render();});
  document.querySelectorAll("[data-year]").forEach(b=>b.onclick=()=>{state.vuosi=parseInt(b.dataset.year);render();});
  document.querySelectorAll("[data-method]").forEach(b=>b.onclick=()=>{state.laskentaTapa=b.dataset.method;render();});

  document.querySelector('[data-action="vuokralainen-changed"]')?.addEventListener("change",e=>{
    saveFormToDraft();
    state.draft.vuokralainen=e.target.value;
    state.draft.kayttoTyyppi="";
    render();
  });

  // Autosave trigger
  document.querySelectorAll("input,select,textarea").forEach(el=>{
    el.addEventListener("input",()=>triggerAutosave());
  });

  document.querySelectorAll("[data-action]").forEach(el=>{
    if(el.dataset.action==="vuokralainen-changed")return;
    el.onclick=async(e)=>{
      e.stopPropagation();
      const a=el.dataset.action,id=el.dataset.id;

      if(a==="sign-out"){await signOut(auth);return;}
      if(a==="close-modal"){
        state.modal=null;state.editId=null;state.editHuoltoId=null;
        state.draft=null;state.tapahtumat=[];render();return;
      }

      if(a==="new-loki"){
        state.modal="loki";state.editId=null;
        const prev=edellisetLukemat();
        state.draft={};
        if(prev.kt!==null)state.draft.konetunnitAlku=prev.kt;
        if(prev.lokilukema!==null)state.draft.veneenLokiAlku=prev.lokilukema;
        state.tapahtumat=[];
        // Palauta mahdollinen draft
        try{
          const ds=localStorage.getItem("quartet_draft");
          if(ds){const dp=JSON.parse(ds);if(confirm("Löytyi tallentamaton luonnos. Jatketaanko siitä?")){state.draft=dp;state.tapahtumat=JSON.parse(dp._tapahtumat||"[]");}else localStorage.removeItem("quartet_draft");}
        }catch(err){}
        render();return;
      }

      if(a==="edit-loki"){
        state.modal="loki";state.editId=id;
        const l=state.loki.find(x=>x.id===id);
        state.tapahtumat=l?.tapahtumat?JSON.parse(JSON.stringify(l.tapahtumat)):[];
        state.draft={};render();return;
      }
      if(a==="new-huolto"){state.modal="huolto";state.editHuoltoId=null;state.draft={};render();return;}
      if(a==="edit-huolto"){state.modal="huolto";state.editHuoltoId=id;state.draft={};render();return;}

      if(a==="delete-loki"){
        if(!confirm("Poistetaanko lokimerkintä?"))return;
        await fsDel("quartet_loki",id);
        if(state.modal==="loki"){state.modal=null;state.editId=null;state.draft=null;state.tapahtumat=[];}
        render();return;
      }
      if(a==="delete-huolto"){
        if(!confirm("Poistetaanko huoltomerkintä?"))return;
        await fsDel("quartet_huollot",id);
        if(state.modal==="huolto"){state.modal=null;state.editHuoltoId=null;state.draft=null;}
        render();return;
      }
      if(a==="del-tap"){
        state.tapahtumat.splice(parseInt(el.dataset.idx),1);render();return;
      }

      if(a==="save-loki"){
        const data=collectLokiData();
        if(!data.pvm)return alert("Päivämäärä on pakollinen.");
        if(!data.vuokralainen)return alert("Valitse vuokralainen / käyttäjä.");
        data.tapahtumat=state.tapahtumat||[];
        const ka=num(data.konetunnitAlku),kl=num(data.konetunnitLoppu);
        data.ktAjettu=kl>ka?+(kl-ka).toFixed(2):0;
        if(state.editId)await fsSet("quartet_loki",state.editId,data);
        else await fsAdd("quartet_loki",data);
        localStorage.removeItem("quartet_draft");
        state.modal=null;state.editId=null;state.draft=null;state.tapahtumat=[];
        render();return;
      }
      if(a==="save-huolto"){
        const data=collectHuoltoData();
        if(!data.pvm)return alert("Päivämäärä on pakollinen.");
        if(!data.kuvaus)return alert("Kuvaus on pakollinen.");
        if(state.editHuoltoId)await fsSet("quartet_huollot",state.editHuoltoId,data);
        else await fsAdd("quartet_huollot",data);
        state.modal=null;state.editHuoltoId=null;state.draft=null;render();return;
      }

      if(a==="cancel-import"){state.importRows=null;render();return;}
      if(a==="confirm-import"){
        await doImport(state.importRows);
        state.importRows=null;state.tab="loki";render();return;
      }
    };
  });
}

  const g=f=>document.querySelector(`[data-field="${f}"]`)?.value||"";

    pvm:g("pvm"),endPvm:g("endPvm"),

    kuukausi:parseInt((g("pvm")||today()).slice(5,7)),

    lahtoAika:g("lahtoAika"),saapumisAika:g("saapumisAika"),

function collectHuoltoData(){

function saveFormToDraft(){
  if(!state.draft)state.draft={};
  ["pvm","endPvm","lahtoAika","saapumisAika","lahtoPaikka","saapumisPaikka","reitti","miehisto","konetunnitAlku","konetunnitLoppu","mailit","veneenLokiAlku","tuuli","tuulenSuunta","saatila","huomiot","kayttoTyyppi"].forEach(f=>{

// ─── CSV IMPORT ───
// Tukee kahta formaattia:
// 1) LOKIKIRJA_2025-formaatti (alkuperäinen lokikirja):
//    Rivi 0: "Taulukko 1;..." (otsikko, ohitetaan)
//    Rivi 1: "Päivämäärä;Miehistö;Veneen loki, aloitus;Aloitus Konetunnit;Lähtö aika;..." (sarakeheaderit)
//    Rivi 2+: data
// 2) Yleinen kvartetti-formaatti puolipistein erotettu
function parseFiFloat(s){
  if(!s)return null;
  const v=parseFloat(String(s).trim().replace(',','.'));
  return isNaN(v)?null:v;
}
function parseFiDate(s){
  s=String(s||"").trim();
  if(!s)return null;
  // dd.mm.yyyy
  const m=s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if(m)return`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  // yyyy-mm-dd jo valmiina
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  return null;
}

window.handleImportFile=async(e)=>{
  const file=e.target.files[0];if(!file)return;

  // BOM-turvallinen luku
  const buf=await file.arrayBuffer();
  const raw=new Uint8Array(buf);
  // poista UTF-8 BOM jos on
  const start=(raw[0]===0xEF&&raw[1]===0xBB&&raw[2]===0xBF)?3:0;
  const text=new TextDecoder('utf-8').decode(raw.slice(start));

  const lines=text.split(/\r?\n/);

  // Tunnista formaatti: jos rivi 0 sisältää "Taulukko" tai rivi 1 sisältää "Päivämäärä", kyseessä alkuperäinen lokikirja
  const isLokikirja=(lines[0]||"").includes("Taulukko")||(lines[1]||"").toLowerCase().includes("ivm");

  let rows=[];

  if(isLokikirja){
    // ── ALKUPERÄINEN LOKIKIRJA-FORMAATTI ──
    // Sarakkeet: 0=pvm,1=miehisto,2=veneen_loki,3=konetunnit,4=lahto_aika,
    //            5=lahtopaikka,6=reitti,7=saapumis_aika,8=saapumispaikka,
    //            9=mailit,10=tuuli,11=tuulen_suunta,12=saatila,13=huomiot
    for(let i=2;i<lines.length;i++){
      const cols=lines[i].split(';');
      const pvmRaw=cols[0]?.trim()||"";
      const pvm=parseFiDate(pvmRaw);
      if(!pvm||!pvm.startsWith('2025'))continue;

      const lahtopaikka=(cols[5]||"").trim();
      const saapumispaikka=(cols[8]||"").trim();
      let reitti=(cols[6]||"").trim();
      if(!reitti&&lahtopaikka&&saapumispaikka)reitti=`${lahtopaikka} - ${saapumispaikka}`;
      else if(!reitti&&lahtopaikka)reitti=lahtopaikka;

      rows.push({
        pvm,
        miehisto:(cols[1]||"").trim(),
        veneenLokiAlku:parseFiFloat(cols[2]),
        konetunnitAlku:parseFiFloat(cols[3]),
        konetunnitLoppu:null,  // alkuperäisessä vain yksi lukema per rivi
        lahtoAika:(cols[4]||"").trim().replace(/[+\s]/g,''),
        lahtoPaikka:lahtopaikka,
        reitti,
        saapumisAika:(cols[7]||"").trim(),
        saapumisPaikka:saapumispaikka,
        mailit:parseFiFloat(cols[9]),
        tuuli:(cols[10]||"").trim(),
        tuulenSuunta:(cols[11]||"").trim(),
        saatila:(cols[12]||"").trim(),
        huomiot:(cols[13]||"").trim(),
        vuokralainen:"",  // merkitään jälkikäteen
        kayttoTyyppi:"",
        tapahtumat:[],
        tuotu:true,
        vuosi:2025,
        kuukausi:parseInt(pvm.slice(5,7)),
      });
    }
  }else{
    // ── YLEINEN FORMAATTI ──
    if(lines.length<2){alert("CSV-tiedosto on tyhjä.");return;}
    const headers=lines[0].split(";").map(h=>h.trim().toLowerCase()
      .replace(/[äå]/g,"a").replace(/ö/g,"o").replace(/\s+/g,"").replace(/,/g,""));
    rows=lines.slice(1).map(line=>{
      const cols=line.split(";");
      const obj={};headers.forEach((h,i)=>{obj[h]=(cols[i]||"").trim();});
      const pvm=parseFiDate(obj.pvm||obj.pavmara||"");
      if(!pvm)return null;
      const reitti=obj.reitti||obj.kohde||((obj.lahtopaikka&&obj.saapumispaikka)?`${obj.lahtopaikka} - ${obj.saapumispaikka}`:"");
      return{
        pvm,reitti,
        vuokralainen:["tmi","oy","oma"].includes(obj.vuokralainen)?obj.vuokralainen:"",
        kayttoTyyppi:obj.kayttotyyppi||obj.tyyppi||"",
        konetunnitAlku:parseFiFloat(obj.konetunniталku||obj["konetunniталku"]||obj.konetunniалку),
        konetunnitLoppu:parseFiFloat(obj.konetunnitloppu),
        mailit:parseFiFloat(obj.mailit),
        tuuli:obj.tuuli||"",tuulenSuunta:obj.tuulensuunta||"",
        saatila:obj.saatila||"",miehisto:obj.miehisto||"",huomiot:obj.huomiot||"",
        tapahtumat:[],tuotu:true,
        vuosi:parseInt((pvm||"").slice(0,4))||null
      };
    }).filter(Boolean);
  }

  if(!rows.length){alert("Ei tuotavia rivejä löydetty. Tarkista tiedoston muoto.");return;}
  state.importRows=rows;render();
};

async function doImport(rows){
  let ok=0;
  for(const r of rows){try{await fsAdd("quartet_loki",r);ok++;}catch(e){console.error(e);}}
  alert(`✅ Tuotiin ${ok} merkintää. Merkitse käyttötarkoitus (tmi/oy/oma) jokaiselle riville Muokkaa-painikkeella.`);
}
